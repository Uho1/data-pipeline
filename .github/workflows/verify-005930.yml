name: Verify 005930 2026Q1 (raw 강제 재fetch)

# 한국 2026Q1 복구 검증 — 005930 한 종목만.
# 핵심: restore 후 raw의 2025/2026 행을 삭제 → financials가 DART에서 강제 재fetch
# (R2 raw의 2026Q1이 비어/불완전해 fetch_slots=0으로 영구 skip되던 문제 우회).
# materialize → sync → income export → R2 업로드 → R2 income.json에 2026Q1 반영 검증.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt boto3 python-dotenv pydantic pydantic-settings
      - name: 005930 raw 강제 재fetch → materialize → sync → income → R2 검증
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "src"
          STORAGE_BACKEND: parquet
          DART_API_KEY_1: ${{ secrets.DART_API_KEY_1 }}
          DART_API_KEY_2: ${{ secrets.DART_API_KEY_2 }}
          DART_API_KEY_3: ${{ secrets.DART_API_KEY_3 }}
          DART_API_KEY_4: ${{ secrets.DART_API_KEY_4 }}
          DART_API_KEY_5: ${{ secrets.DART_API_KEY_5 }}
          DART_API_KEY_6: ${{ secrets.DART_API_KEY_6 }}
          DART_API_KEY_7: ${{ secrets.DART_API_KEY_7 }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          set -e
          python -u -c "
          import importlib.util, glob
          import pandas as pd
          spec = importlib.util.spec_from_file_location('au', 'scripts/auto_update.py')
          au = importlib.util.module_from_spec(spec); spec.loader.exec_module(au)
          from market_data import parquet_reader

          print('=== 1) restore 005930 ===', flush=True)
          au.restore_parquet_for_tickers({'kr': ['005930']})

          print('=== 2) raw 2026만 삭제 (강제 재fetch 유도, 2025는 정상이라 보존) ===', flush=True)
          removed = 0
          for p in glob.glob('data/parquet/kr/dart_financials_raw/**/*.parquet', recursive=True):
              df = pd.read_parquet(p)
              if 'bsns_year' not in df.columns:
                  continue
              before = len(df)
              df = df[~pd.to_numeric(df['bsns_year'], errors='coerce').isin([2026])]
              df.to_parquet(p, index=False)
              removed += before - len(df)
          print(f'  삭제된 raw rows(2026): {removed}', flush=True)

          print('=== 3) ingest (filings -> financials FRESH fetch -> materialize) ===', flush=True)
          au.ingest_tickers_kr(['005930'], '20260101')
          q = parquet_reader.bulk_load_financials_quarterly(['005930'], market='kr')
          d = q.get('005930')
          labels = sorted(d['fiscal_label'].dropna().astype(str)) if d is not None else []
          print('   materialize fiscal_label 최근:', labels[-5:], flush=True)
          assert '2026Q1' in labels, 'FAIL: financials_quarterly에 2026Q1 없음'
          print('   OK: financials_quarterly에 2026Q1 생성', flush=True)

          print('=== 4) sync_parquet_to_r2 ===', flush=True)
          au.sync_parquet_to_r2({'kr': ['005930']})
          "
          echo "=== 5) income.json export (parquet -> data/tickers -> income) ==="
          mkdir -p data/meta
          [ -f data/meta/last_updated.json ] || echo '{}' > data/meta/last_updated.json
          python -u -m market_data export-json --market kr --tickers 005930
          echo "--- data/tickers JSON financials periods ---"
          python3 -c "import json; d=json.load(open('data/tickers/kr/005930.json')); print(d.get('financials',{}).get('periods',[])[-6:])"
          python -u scripts/export_toss_data.py --market kr --ticker 005930
          python3 -c "import json; d=json.load(open('toss-app/public/toss-data/tickers/kr/005930/detail/income.json')); ps=d.get('periods',[]); print('income periods 최근:', ps[-6:]); assert '2026Q1' in ps, 'FAIL: income.json에 2026Q1 없음'; print('OK: income.json에 2026Q1')"
          echo "=== 6) R2 업로드 ==="
          python -u scripts/upload_toss_r2.py --workers 4
          echo "=== 7) R2 income.json 최종 확인 (boto3 직접 download) ==="
          python3 -c "
          import boto3, os, json
          c = boto3.client('s3', endpoint_url='https://%s.r2.cloudflarestorage.com' % os.environ['R2_ACCOUNT_ID'], aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'], aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'])
          obj = c.get_object(Bucket=os.environ['R2_BUCKET_NAME'], Key='toss/tickers/kr/005930/detail/income.json')
          d = json.load(obj['Body'])
          ps = d.get('periods', [])
          print('R2 005930 income periods 최근:', ps[-6:])
          assert '2026Q1' in ps, 'FAIL: R2 income.json에 2026Q1 없음'
          print('>>> SUCCESS: R2 income.json에 2026Q1 반영 완료')
          "
